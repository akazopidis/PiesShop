<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="900" fill="#0f1117"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#f0f0f0" font-size="22" font-weight="bold">PiesShop — System Design</text>
  <line x1="200" y1="52" x2="1000" y2="52" stroke="#444" stroke-width="1"/>

  <!-- ===== LAYER LABELS ===== -->
  <text x="18" y="120" fill="#888" font-size="11" transform="rotate(-90,18,120)">CLIENT</text>
  <text x="18" y="300" fill="#888" font-size="11" transform="rotate(-90,18,300)">CONTROLLER</text>
  <text x="18" y="530" fill="#888" font-size="11" transform="rotate(-90,18,530)">SERVICE / DAO</text>
  <text x="18" y="730" fill="#888" font-size="11" transform="rotate(-90,18,730)">INFRA</text>

  <!-- Horizontal dividers -->
  <line x1="40" y1="160" x2="1160" y2="160" stroke="#2a2a3a" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="40" y1="390" x2="1160" y2="390" stroke="#2a2a3a" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="40" y1="640" x2="1160" y2="640" stroke="#2a2a3a" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ===== CLIENT LAYER ===== -->
  <!-- Browser -->
  <rect x="480" y="70" width="240" height="80" rx="10" fill="#1e2235" stroke="#5b7fe8" stroke-width="2"/>
  <text x="600" y="100" text-anchor="middle" fill="#5b7fe8" font-size="13" font-weight="bold">Browser (Client)</text>
  <text x="600" y="118" text-anchor="middle" fill="#aab" font-size="11">JSP + CSS/SASS + JavaScript</text>
  <text x="600" y="135" text-anchor="middle" fill="#778" font-size="10">HTTP Requests / HTML Responses</text>

  <!-- ===== TOMCAT / SERVLET CONTAINER ===== -->
  <rect x="60" y="175" width="1080" height="200" rx="10" fill="#141825" stroke="#334" stroke-width="1.5"/>
  <text x="100" y="197" fill="#778" font-size="11">Apache Tomcat 10.1.15 — Servlet Container</text>

  <!-- Servlet boxes -->
  <!-- Row 1 -->
  <rect x="80" y="205" width="130" height="50" rx="7" fill="#1a2540" stroke="#3d5a99" stroke-width="1.5"/>
  <text x="145" y="226" text-anchor="middle" fill="#7ca3f5" font-size="11" font-weight="bold">IndexController</text>
  <text x="145" y="242" text-anchor="middle" fill="#667" font-size="10">GET /  /index</text>

  <rect x="225" y="205" width="130" height="50" rx="7" fill="#1a2540" stroke="#3d5a99" stroke-width="1.5"/>
  <text x="290" y="226" text-anchor="middle" fill="#7ca3f5" font-size="11" font-weight="bold">PiesController</text>
  <text x="290" y="242" text-anchor="middle" fill="#667" font-size="10">GET /pies  /pie</text>

  <rect x="370" y="205" width="130" height="50" rx="7" fill="#1a2540" stroke="#3d5a99" stroke-width="1.5"/>
  <text x="435" y="226" text-anchor="middle" fill="#7ca3f5" font-size="11" font-weight="bold">BuyController</text>
  <text x="435" y="242" text-anchor="middle" fill="#667" font-size="10">POST /buy</text>

  <rect x="515" y="205" width="130" height="50" rx="7" fill="#1a2540" stroke="#3d5a99" stroke-width="1.5"/>
  <text x="580" y="226" text-anchor="middle" fill="#7ca3f5" font-size="11" font-weight="bold">LoginController</text>
  <text x="580" y="242" text-anchor="middle" fill="#667" font-size="10">GET/POST /login</text>

  <rect x="660" y="205" width="145" height="50" rx="7" fill="#1a2540" stroke="#3d5a99" stroke-width="1.5"/>
  <text x="732" y="226" text-anchor="middle" fill="#7ca3f5" font-size="11" font-weight="bold">RegisterController</text>
  <text x="732" y="242" text-anchor="middle" fill="#667" font-size="10">GET/POST /register</text>

  <rect x="820" y="205" width="145" height="50" rx="7" fill="#1a2540" stroke="#3d5a99" stroke-width="1.5"/>
  <text x="892" y="226" text-anchor="middle" fill="#7ca3f5" font-size="11" font-weight="bold">ContactController</text>
  <text x="892" y="242" text-anchor="middle" fill="#667" font-size="10">POST /contact</text>

  <rect x="980" y="205" width="140" height="50" rx="7" fill="#1a2540" stroke="#3d5a99" stroke-width="1.5"/>
  <text x="1050" y="226" text-anchor="middle" fill="#7ca3f5" font-size="11" font-weight="bold">AdminController</text>
  <text x="1050" y="242" text-anchor="middle" fill="#667" font-size="10">GET/POST /admin</text>

  <!-- Row 2 -->
  <rect x="225" y="268" width="165" height="50" rx="7" fill="#1a2540" stroke="#3d5a99" stroke-width="1.5"/>
  <text x="307" y="289" text-anchor="middle" fill="#7ca3f5" font-size="11" font-weight="bold">PasswordResetEmail</text>
  <text x="307" y="305" text-anchor="middle" fill="#667" font-size="10">POST /reset-email</text>

  <rect x="405" y="268" width="175" height="50" rx="7" fill="#1a2540" stroke="#3d5a99" stroke-width="1.5"/>
  <text x="492" y="289" text-anchor="middle" fill="#7ca3f5" font-size="11" font-weight="bold">PasswordResetChange</text>
  <text x="492" y="305" text-anchor="middle" fill="#667" font-size="10">POST /reset-password</text>

  <rect x="595" y="268" width="140" height="50" rx="7" fill="#1a2540" stroke="#3d5a99" stroke-width="1.5"/>
  <text x="665" y="289" text-anchor="middle" fill="#7ca3f5" font-size="11" font-weight="bold">LogoutController</text>
  <text x="665" y="305" text-anchor="middle" fill="#667" font-size="10">GET /logout</text>

  <!-- Form Validation label -->
  <rect x="800" y="268" width="320" height="50" rx="7" fill="#1f1a30" stroke="#6b5b95" stroke-width="1.5"/>
  <text x="960" y="287" text-anchor="middle" fill="#b09fdd" font-size="11" font-weight="bold">Form Validation (Jakarta Validation)</text>
  <text x="960" y="303" text-anchor="middle" fill="#776e99" font-size="10">FormLogin · FormRegister · FormOrder · FormContact · Custom Validators</text>

  <!-- ===== SERVICE / DAO LAYER ===== -->
  <!-- UserDAO -->
  <rect x="80" y="410" width="180" height="90" rx="8" fill="#1a2a1a" stroke="#3a8a3a" stroke-width="1.5"/>
  <text x="170" y="432" text-anchor="middle" fill="#6fc86f" font-size="12" font-weight="bold">UserDAO</text>
  <text x="170" y="450" text-anchor="middle" fill="#557755" font-size="10">register / login / logout</text>
  <text x="170" y="465" text-anchor="middle" fill="#557755" font-size="10">verify email / reset pwd</text>
  <text x="170" y="480" text-anchor="middle" fill="#557755" font-size="10">session management</text>

  <!-- PieDAO -->
  <rect x="275" y="410" width="160" height="90" rx="8" fill="#1a2a1a" stroke="#3a8a3a" stroke-width="1.5"/>
  <text x="355" y="432" text-anchor="middle" fill="#6fc86f" font-size="12" font-weight="bold">PieDAO</text>
  <text x="355" y="450" text-anchor="middle" fill="#557755" font-size="10">getAllPies()</text>
  <text x="355" y="465" text-anchor="middle" fill="#557755" font-size="10">getPieById()</text>
  <text x="355" y="480" text-anchor="middle" fill="#557755" font-size="10">product catalog ops</text>

  <!-- OrderDAO -->
  <rect x="450" y="410" width="165" height="90" rx="8" fill="#1a2a1a" stroke="#3a8a3a" stroke-width="1.5"/>
  <text x="532" y="432" text-anchor="middle" fill="#6fc86f" font-size="12" font-weight="bold">OrderDAO</text>
  <text x="532" y="450" text-anchor="middle" fill="#557755" font-size="10">createOrder()</text>
  <text x="532" y="465" text-anchor="middle" fill="#557755" font-size="10">getOrderHistory()</text>
  <text x="532" y="480" text-anchor="middle" fill="#557755" font-size="10">last 5 orders/user</text>

  <!-- OrderItemDAO -->
  <rect x="630" y="410" width="165" height="90" rx="8" fill="#1a2a1a" stroke="#3a8a3a" stroke-width="1.5"/>
  <text x="712" y="432" text-anchor="middle" fill="#6fc86f" font-size="12" font-weight="bold">OrderItemDAO</text>
  <text x="712" y="450" text-anchor="middle" fill="#557755" font-size="10">addItem()</text>
  <text x="712" y="465" text-anchor="middle" fill="#557755" font-size="10">getItemsByOrder()</text>
  <text x="712" y="480" text-anchor="middle" fill="#557755" font-size="10">quantity mapping</text>

  <!-- AreaDAO -->
  <rect x="810" y="410" width="155" height="90" rx="8" fill="#1a2a1a" stroke="#3a8a3a" stroke-width="1.5"/>
  <text x="887" y="432" text-anchor="middle" fill="#6fc86f" font-size="12" font-weight="bold">AreaDAO</text>
  <text x="887" y="450" text-anchor="middle" fill="#557755" font-size="10">getAreas()</text>
  <text x="887" y="465" text-anchor="middle" fill="#557755" font-size="10">10 Athens delivery</text>
  <text x="887" y="480" text-anchor="middle" fill="#557755" font-size="10">neighborhoods</text>

  <!-- Utils -->
  <rect x="980" y="410" width="155" height="90" rx="8" fill="#2a1a1a" stroke="#9a4a3a" stroke-width="1.5"/>
  <text x="1057" y="432" text-anchor="middle" fill="#e07a6a" font-size="12" font-weight="bold">Utils</text>
  <text x="1057" y="450" text-anchor="middle" fill="#885544" font-size="10">Crypto.java</text>
  <text x="1057" y="465" text-anchor="middle" fill="#885544" font-size="10">SHA-256 + salt</text>
  <text x="1057" y="480" text-anchor="middle" fill="#885544" font-size="10">Email.java (SMTP)</text>

  <!-- ===== INFRASTRUCTURE LAYER ===== -->

  <!-- MySQL -->
  <rect x="80" y="660" width="430" height="160" rx="10" fill="#14181f" stroke="#c5922a" stroke-width="2"/>
  <text x="295" y="683" text-anchor="middle" fill="#c5922a" font-size="13" font-weight="bold">MySQL 8.0 — piesshopdb</text>

  <!-- Tables inside MySQL -->
  <rect x="95" y="693" width="90" height="55" rx="5" fill="#1e2030" stroke="#c5922a" stroke-width="1"/>
  <text x="140" y="710" text-anchor="middle" fill="#e0aa50" font-size="10" font-weight="bold">user</text>
  <text x="140" y="724" text-anchor="middle" fill="#887755" font-size="9">id, username</text>
  <text x="140" y="736" text-anchor="middle" fill="#887755" font-size="9">password, salt</text>

  <rect x="200" y="693" width="90" height="55" rx="5" fill="#1e2030" stroke="#c5922a" stroke-width="1"/>
  <text x="245" y="710" text-anchor="middle" fill="#e0aa50" font-size="10" font-weight="bold">pie</text>
  <text x="245" y="724" text-anchor="middle" fill="#887755" font-size="9">id, name, price</text>
  <text x="245" y="736" text-anchor="middle" fill="#887755" font-size="9">ingredients</text>

  <rect x="305" y="693" width="90" height="55" rx="5" fill="#1e2030" stroke="#c5922a" stroke-width="1"/>
  <text x="350" y="710" text-anchor="middle" fill="#e0aa50" font-size="10" font-weight="bold">order</text>
  <text x="350" y="724" text-anchor="middle" fill="#887755" font-size="9">id, user_id</text>
  <text x="350" y="736" text-anchor="middle" fill="#887755" font-size="9">area_id, stamp</text>

  <rect x="400" y="693" width="95" height="55" rx="5" fill="#1e2030" stroke="#c5922a" stroke-width="1"/>
  <text x="447" y="710" text-anchor="middle" fill="#e0aa50" font-size="10" font-weight="bold">order_item</text>
  <text x="447" y="724" text-anchor="middle" fill="#887755" font-size="9">order_id</text>
  <text x="447" y="736" text-anchor="middle" fill="#887755" font-size="9">pie_id, qty</text>

  <rect x="150" y="758" width="90" height="45" rx="5" fill="#1e2030" stroke="#c5922a" stroke-width="1"/>
  <text x="195" y="775" text-anchor="middle" fill="#e0aa50" font-size="10" font-weight="bold">area</text>
  <text x="195" y="789" text-anchor="middle" fill="#887755" font-size="9">10 Athens zones</text>

  <rect x="255" y="758" width="90" height="45" rx="5" fill="#1e2030" stroke="#c5922a" stroke-width="1"/>
  <text x="300" y="775" text-anchor="middle" fill="#e0aa50" font-size="10" font-weight="bold">role</text>
  <text x="300" y="789" text-anchor="middle" fill="#887755" font-size="9">admin / customer</text>

  <rect x="360" y="758" width="90" height="45" rx="5" fill="#1e2030" stroke="#c5922a" stroke-width="1"/>
  <text x="405" y="775" text-anchor="middle" fill="#e0aa50" font-size="10" font-weight="bold">user_role</text>
  <text x="405" y="789" text-anchor="middle" fill="#887755" font-size="9">RBAC junction</text>

  <!-- Gmail SMTP -->
  <rect x="560" y="660" width="230" height="100" rx="10" fill="#14181f" stroke="#4a90d9" stroke-width="2"/>
  <text x="675" y="685" text-anchor="middle" fill="#4a90d9" font-size="13" font-weight="bold">Gmail SMTP</text>
  <text x="675" y="705" text-anchor="middle" fill="#3a6090" font-size="10">smtp.gmail.com:587</text>
  <text x="675" y="722" text-anchor="middle" fill="#3a6090" font-size="10">Order confirmations</text>
  <text x="675" y="738" text-anchor="middle" fill="#3a6090" font-size="10">Password reset emails</text>
  <text x="675" y="754" text-anchor="middle" fill="#3a6090" font-size="10">Contact auto-replies</text>

  <!-- GCP -->
  <rect x="840" y="660" width="280" height="100" rx="10" fill="#14181f" stroke="#56a36b" stroke-width="2"/>
  <text x="980" y="685" text-anchor="middle" fill="#56a36b" font-size="13" font-weight="bold">Google Cloud Platform</text>
  <text x="980" y="705" text-anchor="middle" fill="#3a7050" font-size="10">Hosted VM / App Engine</text>
  <text x="980" y="722" text-anchor="middle" fill="#3a7050" font-size="10">Domain: kazopidispies.com</text>
  <text x="980" y="738" text-anchor="middle" fill="#3a7050" font-size="10">DNS: GoDaddy</text>
  <text x="980" y="754" text-anchor="middle" fill="#3a7050" font-size="10">Port: 8080 (Tomcat)</text>

  <!-- Business Rules box -->
  <rect x="560" y="775" width="560" height="80" rx="8" fill="#1a1520" stroke="#7b5ea7" stroke-width="1.5"/>
  <text x="840" y="798" text-anchor="middle" fill="#b090e0" font-size="12" font-weight="bold">Business Rules</text>
  <text x="840" y="816" text-anchor="middle" fill="#7a6090" font-size="10">Orders: 18:00-22:00 Greece time only  |  Delivery: 10 Athens areas only</text>
  <text x="840" y="832" text-anchor="middle" fill="#7a6090" font-size="10">Phone: Greek format ^[26][0-9]{9}$  |  Discount: 5 EUR for 10+ pies  |  Auth required to order</text>

  <!-- ===== ARROWS ===== -->

  <!-- Browser → Tomcat -->
  <line x1="600" y1="150" x2="600" y2="175" stroke="#5b7fe8" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Controllers → DAOs (representative arrows) -->
  <line x1="170" y1="355" x2="170" y2="410" stroke="#446644" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="355" y1="355" x2="355" y2="410" stroke="#446644" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="532" y1="355" x2="532" y2="410" stroke="#446644" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="712" y1="355" x2="712" y2="410" stroke="#446644" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="887" y1="355" x2="887" y2="410" stroke="#446644" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="1057" y1="355" x2="1057" y2="410" stroke="#884433" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- DAOs → MySQL -->
  <line x1="170" y1="500" x2="200" y2="660" stroke="#c5922a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <line x1="355" y1="500" x2="280" y2="660" stroke="#c5922a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <line x1="532" y1="500" x2="350" y2="660" stroke="#c5922a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <line x1="712" y1="500" x2="420" y2="660" stroke="#c5922a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <line x1="887" y1="500" x2="450" y2="660" stroke="#c5922a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>

  <!-- Utils → Gmail -->
  <line x1="1057" y1="500" x2="750" y2="660" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlueLight)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5b7fe8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#446644"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#884433"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c5922a"/>
    </marker>
    <marker id="arrowBlueLight" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="60" y="860" width="12" height="12" fill="#1a2540" stroke="#3d5a99" stroke-width="1.5"/>
  <text x="78" y="871" fill="#aaa" font-size="10">Controllers</text>
  <rect x="170" y="860" width="12" height="12" fill="#1a2a1a" stroke="#3a8a3a" stroke-width="1.5"/>
  <text x="188" y="871" fill="#aaa" font-size="10">DAOs</text>
  <rect x="260" y="860" width="12" height="12" fill="#2a1a1a" stroke="#9a4a3a" stroke-width="1.5"/>
  <text x="278" y="871" fill="#aaa" font-size="10">Utils</text>
  <rect x="350" y="860" width="12" height="12" fill="#1f1a30" stroke="#6b5b95" stroke-width="1.5"/>
  <text x="368" y="871" fill="#aaa" font-size="10">Form Validation</text>
  <rect x="470" y="860" width="12" height="12" fill="#14181f" stroke="#c5922a" stroke-width="1.5"/>
  <text x="488" y="871" fill="#aaa" font-size="10">Database</text>
  <rect x="565" y="860" width="12" height="12" fill="#14181f" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="583" y="871" fill="#aaa" font-size="10">Email (SMTP)</text>
  <rect x="675" y="860" width="12" height="12" fill="#14181f" stroke="#56a36b" stroke-width="1.5"/>
  <text x="693" y="871" fill="#aaa" font-size="10">Cloud / Infra</text>

</svg>
